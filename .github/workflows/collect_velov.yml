name: Vélo'v Cloud Data Collector

on:
  schedule:
    # S'exécute toutes les 15 minutes (24h/24h)
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # Permet de lancer le collecteur manuellement depuis l'onglet Actions de GitHub

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests mysql-connector-python python-dotenv

    - name: Run collector script
      run: python collect_snapshot.py
      env:
        AIVEN_HOST: ${{ secrets.AIVEN_HOST }}
        AIVEN_PORT: ${{ secrets.AIVEN_PORT }}
        AIVEN_USER: ${{ secrets.AIVEN_USER }}
        AIVEN_PASSWORD: ${{ secrets.AIVEN_PASSWORD }}
